  <div class="tweet-content">
  因为共同类型创伤而建立的关系，可以在一开始就触及深处的情感，很容易发生情感联结。两人也可能会因此而有更多相同的性格、生活习惯和共鸣。在关系过程中，也可以共同应对创伤，互相支持。
  <br/>
  但是应该避免反刍创伤，避免恶性的情感共振，同时避免关系的不平等。让创伤仅为关系的基础，而非关系的核心。
